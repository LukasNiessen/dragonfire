name: Proofstrike

on:
  pull_request:
  push:
    branches:
      - dev
      - stage
      - main

jobs:
  proofstrike:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Proofstrike review
        run: node ./dist/bin/proofstrike.js review --stage pull_request --diff origin/main --format markdown,json,sarif,pr-comment
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .proofstrike/reports
